<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sieg OPS BOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #0D1220;
    --panel:  rgba(22, 29, 51, 0.6);
    --panel2: rgba(30, 39, 68, 0.75);
    --line:   rgba(43, 53, 96, 0.6);
    --amber:  #E8A93D;
    --green:  #57B894;
    --text:   #E9ECF5;
    --muted:  #8892AC;
    --muted2: #5B6486;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--ink);
    color: var(--text);
    min-height: 100vh;
    font-family: 'Noto Sans JP', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(ellipse at top, rgba(232,169,61,0.08), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(87,184,148,0.05), transparent 55%);
    background-attachment: fixed;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: calc(28px + env(safe-area-inset-top,0)) 18px calc(40px + env(safe-area-inset-bottom,0));
  }

  .board-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 4px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--amber);
    margin-bottom: 8px;
  }
  .title {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .title span {
    display: inline-block;
    opacity: 0;
    transform: rotateX(90deg) translateY(4px);
    animation: flap 0.5s cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes flap {
    to { opacity: 1; transform: rotateX(0) translateY(0); }
  }
  .clock-box { text-align: right; flex-shrink: 0; padding-left: 14px; }
  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--amber);
    font-variant-numeric: tabular-nums;
  }
  .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .subline {
    font-size: 12px;
    color: var(--muted);
    margin: 14px 2px 18px;
    letter-spacing: 0.5px;
  }

  .col-heads {
    display: grid;
    grid-template-columns: 40px 1fr 96px 20px;
    gap: 10px;
    padding: 0 16px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted2);
  }

  .board {
    display: flex;
    flex-direction: column;
  }
  .row {
    display: grid;
    grid-template-columns: 40px 1fr 96px 20px;
    align-items: center;
    gap: 10px;
    padding: 16px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: 14px;
    opacity: 0;
    animation: rise 0.5s ease forwards;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .row.active:active {
    transform: scale(0.98);
    border-color: var(--amber);
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .gate {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--muted2);
  }
  .row.active .gate { color: var(--amber); }

  .name-block .name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .name-block .desc {
    font-size: 11.5px;
    color: var(--muted);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    justify-content: flex-end;
    color: var(--muted2);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted2);
    flex-shrink: 0;
  }
  .row.active .dot {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }
  .row.active .status { color: var(--green); }

  .arrow { color: var(--muted2); font-size: 18px; text-align: right; }
  .row.active .arrow { color: var(--amber); }

  .row.pending { pointer-events: none; opacity: 0.55; }
  .row.pending .name-block .name { color: var(--muted); }

  .foot {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px dashed var(--line);
    font-size: 11px;
    color: var(--muted2);
    line-height: 1.8;
    text-align: center;
  }
  .foot b { color: var(--muted); }

  /* ── オーバーレイ共通（名前選択／カテゴリ選択） ── */
  .staff-overlay {
    position: fixed; inset: 0;
    background: rgba(13,18,32,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 24px;
  }
  .staff-overlay.show { display: flex; }
  .staff-box {
    width: 100%;
    max-width: 340px;
    background: var(--panel2);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px 20px;
  }
  .staff-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--amber);
    margin-bottom: 8px;
    text-align: center;
  }
  .staff-title {
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 20px;
  }
  .staff-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .staff-btn {
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
  .staff-btn:active {
    background: var(--amber);
    color: var(--ink);
    border-color: var(--amber);
  }
  .staff-back {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="board-head">
    <div>
      <div class="eyebrow">SIEG OPS BOARD</div>
      <div class="title" id="title"></div>
    </div>
    <div class="clock-box">
      <div class="clock" id="clock">--:--</div>
      <div class="date" id="date">----/--/--</div>
    </div>
  </div>

  <div class="subline">業務ツール一覧 ｜ 使いたいメニューをタップしてください</div>

  <div class="col-heads">
    <div>GATE</div>
    <div>TOOL</div>
    <div style="text-align:right;">STATUS</div>
    <div></div>
  </div>

  <div class="board" id="board">
    <a href="#" class="row active" data-id="keihi" data-mode="staff" data-url="https://script.google.com/macros/s/AKfycbz2D5dOlSN-a5P93rdmz9dsVhs6900cvAInW3JUKNydJ5n96xGNmaJL5Ojw-eI3CwmOXg/exec" data-staff='["福山","古川","清田"]' onclick="return goTo(this)" style="animation-delay:.05s">
      <div class="gate">01</div>
      <div class="name-block">
        <div class="name">経費精算</div>
        <div class="desc">領収書をAIで自動読み取り</div>
      </div>
      <div class="status"><span class="dot"></span>運行中</div>
      <div class="arrow">›</div>
    </a>

    <a href="#" class="row active" data-id="shift" data-mode="category"
       data-options='[
         {"label":"Sieg社員","type":"link","url":"https://docs.google.com/spreadsheets/d/1wRBlTC_U2Mek5xj1YDFUEuAdRRlcVGZGIy_3WmmJLsQ/edit?usp=sharing"},
         {"label":"パートナー様","type":"staff","url":"https://script.google.com/macros/s/AKfycbwx4-wjr4Qmx6zeXDXZhht-65W7veveJvaXXmC9V5MQLipOLxLoWfz-XEUBau8NZ58h/exec","staff":["山口","鈴木","毛利","藤本"]}
       ]'
       onclick="return goTo(this)" style="animation-delay:.15s">
      <div class="gate">02</div>
      <div class="name-block">
        <div class="name">シフト入力</div>
        <div class="desc">スタッフのシフトを登録</div>
      </div>
      <div class="status"><span class="dot"></span>運行中</div>
      <div class="arrow">›</div>
    </a>

    <a href="#" class="row active" data-id="commute" data-mode="category"
       data-options='[
         {"label":"Sieg社員","type":"link","url":"https://docs.google.com/spreadsheets/d/1shpJvauT5rwKCaWH9RQBNZt3DzAA11yD5jNFUg2c6d4/edit?usp=sharing"},
         {"label":"山口","type":"link","url":"https://docs.google.com/spreadsheets/d/1RRLf47jjFvL1MdFvkt43GdSsw_r7NLQOqOQzRCEwmpA/edit?usp=sharing"}
       ]'
       onclick="return goTo(this)" style="animation-delay:.25s">
      <div class="gate">03</div>
      <div class="name-block">
        <div class="name">交通費計算</div>
        <div class="desc">通勤距離・交通費の自動計算</div>
      </div>
      <div class="status"><span class="dot"></span>運行中</div>
      <div class="arrow">›</div>
    </a>
  </div>

  <div class="foot">
    うまく開けない場合は、リンクを長押しして<br>
    <b>「他のブラウザで開く」</b>を選んでください
  </div>

</div>

<!-- 選択オーバーレイ（名前選択／カテゴリ選択 兼用） -->
<div id="staff-overlay" class="staff-overlay">
  <div class="staff-box">
    <div class="staff-eyebrow" id="ov-eyebrow">SELECT PASSENGER</div>
    <div class="staff-title" id="ov-title">あなたの名前を選んでください</div>
    <div class="staff-buttons" id="staff-buttons"></div>
    <div class="staff-back" id="ov-back" style="display:none;" onclick="backToCategory()">‹ 戻る</div>
  </div>
</div>

<script>
  var titleText = "Sieg 業務ポータル";
  var titleEl = document.getElementById('title');
  titleText.split('').forEach(function(ch, i) {
    var span = document.createElement('span');
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    span.style.animationDelay = (i * 0.035) + 's';
    titleEl.appendChild(span);
  });

  function tick() {
    var now = new Date();
    var hh = String(now.getHours()).padStart(2,'0');
    var mm = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = hh + ':' + mm;
    var y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
    document.getElementById('date').textContent = y + '/' + m + '/' + d;
  }
  tick();
  setInterval(tick, 1000 * 15);

  // 名前選択まわり(ツールごとに記憶)
  var STAFF_KEY_PREFIX = "siegStaff_";
  var pendingRow = null;
  var pendingCategoryOptions = null;

  function keyFor(id) { return STAFF_KEY_PREFIX + id; }

  function navigateWithStaff(url, name) {
    var sep = url.indexOf('?') === -1 ? '?' : '&';
    window.location.href = url + sep + 'staff=' + encodeURIComponent(name) + '&v=' + Date.now();
  }

  function navigateDirect(url) {
    window.location.href = url;
  }

  // ── 名前選択オーバーレイ ──
  function openStaffOverlay(list) {
    document.getElementById('ov-eyebrow').textContent = 'SELECT PASSENGER';
    document.getElementById('ov-title').textContent = 'あなたの名前を選んでください';
    var box = document.getElementById('staff-buttons');
    box.innerHTML = '';
    list.forEach(function(name) {
      var btn = document.createElement('button');
      btn.className = 'staff-btn';
      btn.textContent = name;
      btn.onclick = function() { chooseStaffName(name); };
      box.appendChild(btn);
    });
    document.getElementById('ov-back').style.display = pendingCategoryOptions ? 'block' : 'none';
    document.getElementById('staff-overlay').classList.add('show');
  }

  function chooseStaffName(name) {
    if (!pendingRow) return;
    var id = pendingRow.getAttribute('data-id');
    var mode = pendingRow.getAttribute('data-mode');
    document.getElementById('staff-overlay').classList.remove('show');

    if (mode === 'staff') {
      localStorage.setItem(keyFor(id), name);
      var url = pendingRow.getAttribute('data-url');
      pendingRow = null;
      navigateWithStaff(url, name);
    } else if (mode === 'category' && pendingCategoryOptions) {
      var url = pendingCategoryOptions.url;
      pendingRow = null;
      pendingCategoryOptions = null;
      navigateWithStaff(url, name);
    }
  }

  // ── カテゴリ選択オーバーレイ（Sieg社員／パートナー様 等） ──
  function openCategoryOverlay(row) {
    var options = JSON.parse(row.getAttribute('data-options') || '[]');
    document.getElementById('ov-eyebrow').textContent = 'SELECT CATEGORY';
    document.getElementById('ov-title').textContent = '対象を選んでください';
    var box = document.getElementById('staff-buttons');
    box.innerHTML = '';
    options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'staff-btn';
      btn.textContent = opt.label;
      btn.onclick = function() { chooseCategory(opt); };
      box.appendChild(btn);
    });
    document.getElementById('ov-back').style.display = 'none';
    document.getElementById('staff-overlay').classList.add('show');
  }

  function chooseCategory(opt) {
    if (opt.type === 'link') {
      document.getElementById('staff-overlay').classList.remove('show');
      pendingRow = null;
      pendingCategoryOptions = null;
      navigateDirect(opt.url);
    } else if (opt.type === 'staff') {
      pendingCategoryOptions = opt;
      openStaffOverlay(opt.staff);
    }
  }

  function backToCategory() {
    if (!pendingRow) return;
    pendingCategoryOptions = null;
    openCategoryOverlay(pendingRow);
  }

  function goTo(el) {
    var mode = el.getAttribute('data-mode');
    pendingRow = el;

    if (mode === 'staff') {
      var id = el.getAttribute('data-id');
      var url = el.getAttribute('data-url');
      var name = localStorage.getItem(keyFor(id));
      if (name) {
        pendingRow = null;
        navigateWithStaff(url, name);
      } else {
        openStaffOverlay(JSON.parse(el.getAttribute('data-staff') || '[]'));
      }
    } else if (mode === 'category') {
      openCategoryOverlay(el);
    }
    return false;
  }
</script>

</body>
</html>
