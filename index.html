<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10263d">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>経費申請</title>
  <style>
    :root {
      --navy: #10263d;
      --navy-2: #173a59;
      --blue: #1f6f9f;
      --teal: #13a47b;
      --gold: #d9ad4c;
      --bg: #eef3f7;
      --card: #ffffff;
      --text: #15283a;
      --muted: #728195;
      --line: #dce5ec;
      --danger: #d9485f;
      --success: #18865f;
      --shadow: 0 12px 30px rgba(16, 38, 61, .08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    .hidden { display: none !important; }

    .staff-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 28px 20px;
      background:
        radial-gradient(circle at 80% 15%, rgba(31, 111, 159, .55), transparent 34%),
        linear-gradient(145deg, #0d2236, #173a59 58%, #145778);
    }
    .staff-panel { width: min(390px, 100%); color: white; }
    .staff-brand {
      width: 64px; height: 64px; display: grid; place-items: center;
      border: 1px solid rgba(255,255,255,.2); border-radius: 20px;
      background: rgba(255,255,255,.1); font-size: 30px; margin-bottom: 24px;
      backdrop-filter: blur(12px);
    }
    .staff-panel h1 { font-size: 27px; line-height: 1.35; margin: 0 0 8px; }
    .staff-panel p { margin: 0 0 24px; color: rgba(255,255,255,.67); font-size: 14px; }
    .staff-list { display: grid; gap: 12px; }
    .staff-btn {
      width: 100%; border: 0; border-radius: 15px; padding: 17px 18px;
      background: white; color: var(--navy); text-align: left; font-weight: 800;
      box-shadow: 0 8px 28px rgba(0,0,0,.13); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
    }
    .staff-btn::after { content: "→"; color: var(--blue); font-size: 20px; }
    .staff-status { padding: 18px; border-radius: 14px; background: rgba(255,255,255,.1); color: rgba(255,255,255,.8); }

    .app { max-width: 520px; margin: 0 auto; min-height: 100vh; padding-bottom: 98px; }
    .hero {
      position: relative; overflow: hidden;
      padding: calc(20px + env(safe-area-inset-top)) 18px 24px;
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--navy-2) 62%, #1d5b78);
    }
    .hero::after {
      content: ""; position: absolute; width: 220px; height: 220px; border-radius: 50%;
      right: -100px; top: -110px; background: rgba(255,255,255,.07);
    }
    .hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; position: relative; z-index: 1; }
    .eyebrow { font-size: 10px; letter-spacing: .18em; color: var(--gold); font-weight: 800; margin-bottom: 5px; }
    .hero-name { font-size: 23px; font-weight: 850; }
    .switch-link { color: rgba(255,255,255,.55); font-size: 11px; text-decoration: underline; cursor: pointer; margin-top: 5px; }
    .total-box { text-align: right; white-space: nowrap; }
    .total-label { font-size: 11px; color: rgba(255,255,255,.62); }
    .total-value { font-size: 27px; font-weight: 900; color: #f1c75e; letter-spacing: -.03em; }
    .month-pill {
      display: inline-flex; align-items: center; gap: 7px; margin-top: 17px;
      padding: 8px 11px; border-radius: 999px; background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.82); font-size: 12px; position: relative; z-index: 1;
    }

    main { padding: 16px; }
    .page { display: none; }
    .page.active { display: block; }
    .card {
      background: var(--card); border: 1px solid rgba(220,229,236,.8); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px; margin-bottom: 14px;
    }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 15px; }
    .card-title { font-size: 13px; letter-spacing: .08em; font-weight: 850; color: var(--navy); }
    .card-note { font-size: 11px; color: var(--muted); }

    .segmented { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: #dde7ee; padding: 5px; border-radius: 14px; margin-bottom: 14px; }
    .segment { border: 0; background: transparent; color: var(--muted); padding: 11px; border-radius: 10px; font-weight: 800; cursor: pointer; }
    .segment.active { background: white; color: var(--navy); box-shadow: 0 3px 10px rgba(16,38,61,.09); }

    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .upload-btn {
      min-height: 114px; border-radius: 15px; border: 1.5px dashed #b9c8d4; background: #f8fafc;
      color: var(--navy); font-weight: 800; cursor: pointer; display: grid; place-items: center; padding: 14px;
    }
    .upload-icon { display: block; font-size: 31px; margin-bottom: 7px; }
    .upload-sub { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 5px; }
    .preview { position: relative; margin-top: 13px; border-radius: 15px; overflow: hidden; background: #e9eef2; }
    .preview img { width: 100%; max-height: 260px; display: block; object-fit: contain; }
    .clear-photo { position: absolute; top: 9px; right: 9px; width: 34px; height: 34px; border: 0; border-radius: 50%; background: rgba(16,38,61,.75); color: white; font-weight: bold; cursor: pointer; }

    .primary, .secondary, .danger-btn {
      width: 100%; min-height: 52px; border-radius: 13px; border: 0; padding: 14px 16px;
      font-weight: 850; cursor: pointer; transition: transform .12s ease, opacity .12s ease;
    }
    .primary { background: linear-gradient(135deg, var(--teal), #0c7f64); color: white; box-shadow: 0 8px 18px rgba(19,164,123,.22); }
    .secondary { background: linear-gradient(135deg, var(--navy-2), var(--navy)); color: white; }
    .danger-btn { background: #fff0f2; color: var(--danger); border: 1px solid #f3ccd3; }
    .primary:active, .secondary:active, .danger-btn:active { transform: scale(.99); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .mt { margin-top: 13px; }

    .loading-box { text-align: center; padding: 22px 10px; color: var(--muted); }
    .spinner { width: 31px; height: 31px; border: 3px solid #d8e3ea; border-top-color: var(--teal); border-radius: 50%; margin: 0 auto 10px; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .receipt-card { border: 1px solid var(--line); border-radius: 15px; padding: 15px; margin-top: 11px; background: #fbfcfd; }
    .receipt-card.off { opacity: .55; }
    .receipt-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .receipt-number { font-size: 12px; font-weight: 850; color: var(--navy); }
    .confidence { font-size: 10px; padding: 5px 8px; border-radius: 999px; background: #e8f7f1; color: var(--success); font-weight: 800; }
    .toggle { width: 30px; height: 30px; border: 2px solid #b9c7d2; border-radius: 50%; display: grid; place-items: center; cursor: pointer; color: transparent; background: white; margin-left: 8px; }
    .toggle.on { background: var(--blue); border-color: var(--blue); color: white; }
    .receipt-actions { display: flex; align-items: center; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
    .field.full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 11px; font-weight: 800; }
    input, select, textarea {
      width: 100%; border: 1.5px solid var(--line); border-radius: 11px; padding: 12px 13px;
      color: var(--text); background: white; outline: none; font-size: 15px;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(31,111,159,.09); }
    textarea { resize: vertical; min-height: 78px; }

    .category-chips { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
    .chip { border: 1.5px solid var(--line); border-radius: 12px; padding: 13px 8px; background: #f9fbfc; color: var(--muted); font-weight: 800; cursor: pointer; }
    .chip.active { border-color: var(--blue); background: #eaf4f9; color: var(--navy); }

    .message { min-height: 21px; margin-top: 12px; font-size: 13px; text-align: center; font-weight: 750; }
    .message.success { color: var(--success); }
    .message.error { color: var(--danger); }

    .history-controls { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
    .small-btn { border: 0; border-radius: 11px; padding: 12px 15px; min-height: 46px; background: var(--navy); color: white; font-weight: 800; cursor: pointer; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { border-radius: 14px; padding: 15px; background: linear-gradient(145deg, #f7fafc, #edf3f7); border: 1px solid var(--line); }
    .stat-label { font-size: 11px; color: var(--muted); }
    .stat-value { margin-top: 4px; font-size: 22px; font-weight: 900; color: var(--navy); }

    .expense-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 15px 0; border-bottom: 1px solid #e7edf2; }
    .expense-row:last-child { border-bottom: 0; }
    .expense-category { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 850; color: var(--blue); }
    .expense-desc { margin-top: 4px; font-size: 14px; font-weight: 800; color: var(--text); word-break: break-word; }
    .expense-meta { margin-top: 5px; font-size: 11px; color: var(--muted); }
    .expense-amount { font-size: 17px; font-weight: 900; text-align: right; white-space: nowrap; }
    .row-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 7px; }
    .link-btn, .delete-btn { border: 0; background: transparent; padding: 4px; font-size: 11px; font-weight: 800; cursor: pointer; }
    .link-btn { color: var(--blue); text-decoration: none; }
    .delete-btn { color: var(--danger); }
    .empty { text-align: center; padding: 32px 12px; color: var(--muted); }

    .setting-row { padding: 13px 0; border-bottom: 1px solid var(--line); }
    .setting-row:last-child { border-bottom: 0; }
    .setting-label { font-size: 11px; color: var(--muted); }
    .setting-value { margin-top: 4px; font-weight: 800; word-break: break-all; }
    .external { color: var(--blue); font-weight: 800; text-decoration: none; }

    .bottom-nav {
      position: fixed; z-index: 200; left: 50%; bottom: 0; transform: translateX(-50%);
      width: min(520px, 100%); display: grid; grid-template-columns: repeat(3, 1fr);
      background: rgba(16,38,61,.97); padding: 7px 8px calc(7px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 25px rgba(16,38,61,.15); backdrop-filter: blur(15px);
    }
    .nav-btn { border: 0; background: transparent; color: rgba(255,255,255,.45); border-radius: 12px; padding: 9px 5px 7px; font-size: 11px; font-weight: 800; cursor: pointer; }
    .nav-icon { display: block; font-size: 21px; line-height: 1.1; margin-bottom: 3px; }
    .nav-btn.active { color: #f1c75e; background: rgba(255,255,255,.06); }

    .toast {
      position: fixed; z-index: 2000; left: 50%; bottom: 94px; transform: translate(-50%, 20px);
      width: min(420px, calc(100% - 32px)); padding: 13px 16px; border-radius: 12px;
      background: var(--navy); color: white; text-align: center; font-size: 13px; font-weight: 750;
      opacity: 0; pointer-events: none; transition: .22s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.error { background: #a92d43; }

    @media (min-width: 700px) {
      body { padding: 24px 0; }
      .app { min-height: calc(100vh - 48px); border-radius: 24px; overflow: hidden; box-shadow: 0 18px 60px rgba(16,38,61,.14); background: var(--bg); }
      .bottom-nav { bottom: 24px; border-radius: 0 0 24px 24px; }
    }
  </style>
</head>
<body>
  <div id="staff-screen" class="staff-screen">
    <div class="staff-panel">
      <div class="staff-brand">¥</div>
      <h1>経費申請を<br>シンプルに。</h1>
      <p>利用するスタッフ名を選択してください。</p>
      <div id="staff-list" class="staff-list"><div class="staff-status">システムに接続中...</div></div>
    </div>
  </div>

  <div id="app" class="app hidden">
    <header class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">EXPENSE CLAIM</div>
          <div id="header-name" class="hero-name">—</div>
          <div class="switch-link" onclick="switchStaff()">スタッフを切り替える</div>
        </div>
        <div class="total-box">
          <div class="total-label">表示月の合計</div>
          <div id="header-total" class="total-value">¥0</div>
        </div>
      </div>
      <div id="header-month" class="month-pill">📅 —</div>
    </header>

    <main>
      <section id="page-new" class="page active">
        <div class="segmented">
          <button id="tab-photo" class="segment active" onclick="switchInputMode('photo')">📷 AI読取</button>
          <button id="tab-manual" class="segment" onclick="switchInputMode('manual')">✏️ 手動入力</button>
        </div>

        <div id="photo-mode">
          <div class="card">
            <div class="card-head">
              <div class="card-title">領収書を追加</div>
              <div class="card-note">複数枚を1枚に撮影してもOK</div>
            </div>
            <div class="upload-grid">
              <button class="upload-btn" onclick="document.getElementById('camera-file').click()">
                <span><span class="upload-icon">📷</span>撮影する<span class="upload-sub">カメラを起動</span></span>
              </button>
              <button class="upload-btn" onclick="document.getElementById('gallery-file').click()">
                <span><span class="upload-icon">🖼️</span>選択する<span class="upload-sub">写真から選ぶ</span></span>
              </button>
            </div>
            <input id="camera-file" type="file" accept="image/*" capture="environment" hidden onchange="handleImageFile(this)">
            <input id="gallery-file" type="file" accept="image/*" hidden onchange="handleImageFile(this)">

            <div id="preview" class="preview hidden">
              <img id="preview-image" alt="領収書プレビュー">
              <button class="clear-photo" onclick="clearImage()">×</button>
            </div>
            <button id="analyze-button" class="primary mt hidden" onclick="analyzeImage()">AIで領収書を読み取る</button>
            <div id="analyze-loading" class="loading-box hidden"><div class="spinner"></div>Geminiが読み取っています...</div>
          </div>

          <div id="ai-results-card" class="card hidden">
            <div class="card-head">
              <div class="card-title">読み取り結果</div>
              <div class="card-note">内容を確認・修正してください</div>
            </div>
            <div id="ai-results"></div>
            <button id="save-ai-button" class="secondary mt" onclick="saveAiExpenses()">選択した経費を登録</button>
            <div id="ai-message" class="message"></div>
          </div>
        </div>

        <div id="manual-mode" class="hidden">
          <div class="card">
            <div class="card-head"><div class="card-title">経費を手動入力</div></div>
            <label>項目</label>
            <div id="manual-categories" class="category-chips"></div>
            <div class="form-grid mt">
              <div class="field"><label for="manual-date">利用日</label><input id="manual-date" type="date"></div>
              <div class="field"><label for="manual-amount">金額</label><input id="manual-amount" type="number" min="1" inputmode="numeric" placeholder="1500"></div>
              <div class="field full"><label for="manual-desc">内容・摘要</label><textarea id="manual-desc" placeholder="例：○○パーキング利用"></textarea></div>
            </div>
            <button id="save-manual-button" class="secondary mt" onclick="saveManualExpense()">この経費を登録</button>
            <div id="manual-message" class="message"></div>
          </div>
        </div>
      </section>

      <section id="page-history" class="page">
        <div class="card">
          <div class="card-head"><div class="card-title">経費履歴</div><div class="card-note">月ごとに確認</div></div>
          <div class="history-controls">
            <div><label for="history-month">対象年月</label><input id="history-month" type="month"></div>
            <button class="small-btn" onclick="loadHistory()">表示</button>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-label">件数</div><div id="stat-count" class="stat-value">0件</div></div>
          <div class="stat"><div class="stat-label">合計金額</div><div id="stat-total" class="stat-value">¥0</div></div>
        </div>
        <div class="card">
          <div id="history-list"><div class="empty">読み込み中...</div></div>
        </div>
      </section>

      <section id="page-settings" class="page">
        <div class="card">
          <div class="card-head"><div class="card-title">月次PDF</div><div class="card-note">Google Driveへ保存</div></div>
          <label for="pdf-month">対象年月</label>
          <input id="pdf-month" type="month">
          <button id="pdf-button" class="secondary mt" onclick="exportPdf()">月次レポートをPDF保存</button>
          <div id="pdf-message" class="message"></div>
          <div id="pdf-link-wrap" style="text-align:center;margin-top:8px;"></div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">システム情報</div></div>
          <div class="setting-row"><div class="setting-label">利用スタッフ</div><div id="settings-staff" class="setting-value">—</div></div>
          <div class="setting-row"><div class="setting-label">接続先</div><div id="settings-sheet" class="setting-value">—</div></div>
          <div class="setting-row"><div class="setting-label">スプレッドシート</div><div class="setting-value"><a id="settings-sheet-link" class="external" target="_blank" rel="noopener">開く ↗</a></div></div>
        </div>
        <div class="card">
          <button class="danger-btn" onclick="switchStaff()">スタッフ選択に戻る</button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="new" onclick="showPage('new')"><span class="nav-icon">＋</span>新規申請</button>
      <button class="nav-btn" data-page="history" onclick="showPage('history')"><span class="nav-icon">▤</span>履歴</button>
      <button class="nav-btn" data-page="settings" onclick="showPage('settings')"><span class="nav-icon">⚙</span>設定</button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // 現在のGAS WebアプリURL。既存デプロイを更新する場合は変更不要です。
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzyXEYU_0VhvEpnmZx3JWaxXRdOEP-Lam9R9Fxwv4nVRr6ExzQrBmdO-rgUlwGkcgzU/exec';
    const STAFF_STORAGE_KEY = 'expense-v2-staff';

    let config = null;
    let currentStaff = localStorage.getItem(STAFF_STORAGE_KEY) || '';
    let currentImage = null;
    let aiReceipts = [];
    let manualCategory = '';
    let historyData = [];
    let aiRequestId = '';
    let manualRequestId = '';

    document.addEventListener('DOMContentLoaded', boot);

    async function boot() {
      setDefaultDates();
      try {
        config = await callApi('getConfig', {}, 20000);
        renderStaffButtons();
        if (currentStaff && config.staff.includes(currentStaff)) startApp();
      } catch (error) {
        document.getElementById('staff-list').innerHTML = '';
        const box = document.createElement('div');
        box.className = 'staff-status';
        box.textContent = '接続できませんでした：' + error.message;
        document.getElementById('staff-list').appendChild(box);
      }
    }

    function renderStaffButtons() {
      const list = document.getElementById('staff-list');
      list.innerHTML = '';
      config.staff.forEach(name => {
        const button = document.createElement('button');
        button.className = 'staff-btn';
        button.textContent = name;
        button.onclick = () => selectStaff(name);
        list.appendChild(button);
      });
      if (!config.staff.length) {
        const box = document.createElement('div');
        box.className = 'staff-status';
        box.textContent = '設定シートに有効なスタッフがありません。';
        list.appendChild(box);
      }
    }

    function selectStaff(name) {
      currentStaff = name;
      localStorage.setItem(STAFF_STORAGE_KEY, name);
      startApp();
    }

    function startApp() {
      document.getElementById('staff-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('header-name').textContent = currentStaff;
      document.getElementById('settings-staff').textContent = currentStaff;
      document.getElementById('settings-sheet').textContent = config.spreadsheetName;
      document.getElementById('settings-sheet-link').href = config.spreadsheetUrl;
      renderManualCategories();
      loadHistory();
    }

    function switchStaff() {
      localStorage.removeItem(STAFF_STORAGE_KEY);
      currentStaff = '';
      document.getElementById('app').classList.add('hidden');
      document.getElementById('staff-screen').classList.remove('hidden');
      renderStaffButtons();
    }

    function setDefaultDates() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      const today = local.toISOString().slice(0, 10);
      const month = today.slice(0, 7);
      document.getElementById('manual-date').value = today;
      document.getElementById('history-month').value = month;
      document.getElementById('pdf-month').value = month;
    }

    async function callApi(action, params = {}, timeoutMs = 20000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action, ...params }),
          signal: controller.signal,
          redirect: 'follow'
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const json = await response.json();
        if (!json.ok) throw new Error(json.error || '処理に失敗しました');
        return json.data;
      } catch (error) {
        if (error.name === 'AbortError') throw new Error('通信がタイムアウトしました。もう一度お試しください');
        throw error;
      } finally {
        clearTimeout(timer);
      }
    }

    function switchInputMode(mode) {
      document.getElementById('tab-photo').classList.toggle('active', mode === 'photo');
      document.getElementById('tab-manual').classList.toggle('active', mode === 'manual');
      document.getElementById('photo-mode').classList.toggle('hidden', mode !== 'photo');
      document.getElementById('manual-mode').classList.toggle('hidden', mode !== 'manual');
    }

    function showPage(page) {
      document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id === `page-${page}`));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.toggle('active', el.dataset.page === page));
      if (page === 'history') loadHistory();
    }

    async function handleImageFile(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      try {
        currentImage = await compressImage(file);
        aiRequestId = '';
        document.getElementById('preview-image').src = currentImage.previewUrl;
        document.getElementById('preview').classList.remove('hidden');
        document.getElementById('analyze-button').classList.remove('hidden');
        document.getElementById('ai-results-card').classList.add('hidden');
        aiReceipts = [];
      } catch (error) {
        showToast(error.message, true);
      }
    }

    async function compressImage(file) {
      const originalDataUrl = await readFileAsDataUrl(file);
      try {
        const image = await loadImage(originalDataUrl);
        const maxSide = 1800;
        const scale = Math.min(1, maxSide / Math.max(image.naturalWidth, image.naturalHeight));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
        canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
        const context = canvas.getContext('2d');
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        const compressedDataUrl = canvas.toDataURL('image/jpeg', .82);
        return {
          base64: compressedDataUrl.split(',')[1],
          mimeType: 'image/jpeg',
          fileName: file.name || 'receipt.jpg',
          previewUrl: compressedDataUrl
        };
      } catch (_) {
        return {
          base64: originalDataUrl.split(',')[1],
          mimeType: file.type || 'image/jpeg',
          fileName: file.name || 'receipt.jpg',
          previewUrl: originalDataUrl
        };
      }
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('画像を読み込めませんでした'));
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function clearImage() {
      currentImage = null;
      aiReceipts = [];
      aiRequestId = '';
      document.getElementById('camera-file').value = '';
      document.getElementById('gallery-file').value = '';
      document.getElementById('preview').classList.add('hidden');
      document.getElementById('analyze-button').classList.add('hidden');
      document.getElementById('ai-results-card').classList.add('hidden');
      document.getElementById('ai-results').innerHTML = '';
      setMessage('ai-message', '', '');
    }

    async function analyzeImage() {
      if (!currentImage) return;
      const button = document.getElementById('analyze-button');
      setBusy(button, true);
      document.getElementById('analyze-loading').classList.remove('hidden');
      document.getElementById('ai-results-card').classList.add('hidden');
      try {
        const data = await callApi('analyzeReceipt', {
          base64Image: currentImage.base64,
          mimeType: currentImage.mimeType
        }, 60000);
        aiReceipts = data.receipts.map(item => ({ ...item, selected: true }));
        renderAiResults();
        document.getElementById('ai-results-card').classList.remove('hidden');
        document.getElementById('ai-results-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (error) {
        showToast(error.message, true);
      } finally {
        setBusy(button, false);
        document.getElementById('analyze-loading').classList.add('hidden');
      }
    }

    function renderAiResults() {
      const container = document.getElementById('ai-results');
      container.innerHTML = '';
      aiReceipts.forEach((receipt, index) => {
        const card = document.createElement('div');
        card.className = 'receipt-card' + (receipt.selected ? '' : ' off');
        card.id = `receipt-${index}`;

        const top = document.createElement('div');
        top.className = 'receipt-top';
        const number = document.createElement('div');
        number.className = 'receipt-number';
        number.textContent = `領収書 ${index + 1}`;
        const actions = document.createElement('div');
        actions.className = 'receipt-actions';
        const confidence = document.createElement('span');
        confidence.className = 'confidence';
        confidence.textContent = `確信度 ${receipt.confidence || 0}%`;
        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'toggle' + (receipt.selected ? ' on' : '');
        toggle.textContent = '✓';
        toggle.onclick = () => toggleReceipt(index);
        actions.append(confidence, toggle);
        top.append(number, actions);

        const grid = document.createElement('div');
        grid.className = 'form-grid';
        grid.append(
          makeSelectField('項目', `ai-category-${index}`, config.categories, receipt.category),
          makeInputField('利用日', `ai-date-${index}`, 'date', receipt.date || ''),
          makeInputField('金額', `ai-amount-${index}`, 'number', receipt.amount || ''),
          makeInputField('内容・摘要', `ai-desc-${index}`, 'text', receipt.descriptionSuggestion || receipt.merchant || '', true)
        );

        card.append(top, grid);
        container.appendChild(card);
      });
    }

    function makeSelectField(labelText, id, options, selected) {
      const field = document.createElement('div');
      field.className = 'field';
      const label = document.createElement('label');
      label.htmlFor = id;
      label.textContent = labelText;
      const select = document.createElement('select');
      select.id = id;
      options.forEach(value => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        option.selected = value === selected;
        select.appendChild(option);
      });
      field.append(label, select);
      return field;
    }

    function makeInputField(labelText, id, type, value, full = false) {
      const field = document.createElement('div');
      field.className = 'field' + (full ? ' full' : '');
      const label = document.createElement('label');
      label.htmlFor = id;
      label.textContent = labelText;
      const input = document.createElement('input');
      input.id = id;
      input.type = type;
      input.value = value;
      if (type === 'number') { input.min = '1'; input.inputMode = 'numeric'; }
      field.append(label, input);
      return field;
    }

    function toggleReceipt(index) {
      aiReceipts[index].selected = !aiReceipts[index].selected;
      renderAiResults();
    }

    async function saveAiExpenses() {
      const selected = [];
      aiReceipts.forEach((receipt, index) => {
        if (!receipt.selected) return;
        selected.push({
          category: document.getElementById(`ai-category-${index}`).value,
          date: document.getElementById(`ai-date-${index}`).value,
          amount: Number(document.getElementById(`ai-amount-${index}`).value),
          description: document.getElementById(`ai-desc-${index}`).value.trim(),
          method: 'AI読取'
        });
      });
      if (!selected.length) return setMessage('ai-message', '登録する経費を選択してください', 'error');
      for (let i = 0; i < selected.length; i++) {
        if (!selected[i].date || !selected[i].category || !selected[i].amount) {
          return setMessage('ai-message', `${i + 1}件目の日付・項目・金額を確認してください`, 'error');
        }
      }

      const button = document.getElementById('save-ai-button');
      setBusy(button, true, '登録中...');
      setMessage('ai-message', '登録しています...', '');
      try {
        aiRequestId = aiRequestId || createRequestId();
        const result = await callApi('saveExpenses', {
          staffName: currentStaff,
          requestId: aiRequestId,
          expenses: selected,
          base64Image: currentImage && currentImage.base64,
          mimeType: currentImage && currentImage.mimeType,
          fileName: currentImage && currentImage.fileName
        }, 60000);
        setMessage('ai-message', result.message, 'success');
        showToast(result.message);
        aiRequestId = '';
        clearImage();
        await loadHistory();
      } catch (error) {
        setMessage('ai-message', error.message, 'error');
      } finally {
        setBusy(button, false);
      }
    }

    function renderManualCategories() {
      const container = document.getElementById('manual-categories');
      container.innerHTML = '';
      config.categories.forEach(category => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'chip' + (manualCategory === category ? ' active' : '');
        button.textContent = category;
        button.onclick = () => {
          manualCategory = category;
          renderManualCategories();
        };
        container.appendChild(button);
      });
    }

    async function saveManualExpense() {
      const date = document.getElementById('manual-date').value;
      const amount = Number(document.getElementById('manual-amount').value);
      const description = document.getElementById('manual-desc').value.trim();
      if (!manualCategory || !date || !amount) return setMessage('manual-message', '項目・利用日・金額を入力してください', 'error');

      const button = document.getElementById('save-manual-button');
      setBusy(button, true, '登録中...');
      try {
        manualRequestId = manualRequestId || createRequestId();
        const result = await callApi('saveExpenses', {
          staffName: currentStaff,
          requestId: manualRequestId,
          expenses: [{ category: manualCategory, date, amount, description, method: '手動入力' }]
        }, 30000);
        setMessage('manual-message', result.message, 'success');
        showToast(result.message);
        manualRequestId = '';
        document.getElementById('manual-amount').value = '';
        document.getElementById('manual-desc').value = '';
        manualCategory = '';
        renderManualCategories();
        await loadHistory();
      } catch (error) {
        setMessage('manual-message', error.message, 'error');
      } finally {
        setBusy(button, false);
      }
    }

    async function loadHistory() {
      if (!currentStaff) return;
      const month = document.getElementById('history-month').value || config.currentMonth;
      document.getElementById('history-list').innerHTML = '<div class="loading-box"><div class="spinner"></div>読み込み中...</div>';
      try {
        const data = await callApi('listExpenses', { staffName: currentStaff, yearMonth: month }, 30000);
        historyData = data.expenses;
        renderHistory(data);
      } catch (error) {
        document.getElementById('history-list').innerHTML = '';
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = error.message;
        document.getElementById('history-list').appendChild(empty);
      }
    }

    function renderHistory(data) {
      const month = data.summary.yearMonth;
      const list = document.getElementById('history-list');
      document.getElementById('stat-count').textContent = `${data.summary.count}件`;
      document.getElementById('stat-total').textContent = formatMoney(data.summary.total);
      document.getElementById('header-total').textContent = formatMoney(data.summary.total);
      document.getElementById('header-month').textContent = `📅 ${month.replace('-', '年')}月`;
      document.getElementById('pdf-month').value = month;
      list.innerHTML = '';

      if (!data.expenses.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'この月の経費はまだありません';
        list.appendChild(empty);
        return;
      }

      data.expenses.forEach(expense => {
        const row = document.createElement('div');
        row.className = 'expense-row';
        const left = document.createElement('div');
        const category = document.createElement('div');
        category.className = 'expense-category';
        category.textContent = expense.category;
        const desc = document.createElement('div');
        desc.className = 'expense-desc';
        desc.textContent = expense.description || '（内容なし）';
        const meta = document.createElement('div');
        meta.className = 'expense-meta';
        meta.textContent = `${expense.date} ・ ${expense.method}`;
        left.append(category, desc, meta);

        const right = document.createElement('div');
        const amount = document.createElement('div');
        amount.className = 'expense-amount';
        amount.textContent = formatMoney(expense.amount);
        const actions = document.createElement('div');
        actions.className = 'row-actions';
        if (expense.receiptUrl) {
          const link = document.createElement('a');
          link.className = 'link-btn';
          link.textContent = '領収書';
          link.href = expense.receiptUrl;
          link.target = '_blank';
          link.rel = 'noopener';
          actions.appendChild(link);
        }
        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '削除';
        del.onclick = () => deleteExpense(expense.id);
        actions.appendChild(del);
        right.append(amount, actions);
        row.append(left, right);
        list.appendChild(row);
      });
    }

    async function deleteExpense(expenseId) {
      if (!confirm('この経費を削除しますか？')) return;
      try {
        await callApi('deleteExpense', { staffName: currentStaff, expenseId }, 30000);
        showToast('削除しました');
        await loadHistory();
      } catch (error) {
        showToast(error.message, true);
      }
    }

    async function exportPdf() {
      const month = document.getElementById('pdf-month').value;
      if (!month) return setMessage('pdf-message', '対象年月を選択してください', 'error');
      const button = document.getElementById('pdf-button');
      setBusy(button, true, 'PDF作成中...');
      setMessage('pdf-message', 'PDFを作成しています...', '');
      document.getElementById('pdf-link-wrap').innerHTML = '';
      try {
        const result = await callApi('exportMonthlyPdf', { staffName: currentStaff, yearMonth: month }, 60000);
        setMessage('pdf-message', result.message, 'success');
        showToast(result.message);
        const link = document.createElement('a');
        link.className = 'external';
        link.href = result.fileUrl;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = '保存したPDFを開く ↗';
        document.getElementById('pdf-link-wrap').appendChild(link);
      } catch (error) {
        setMessage('pdf-message', error.message, 'error');
      } finally {
        setBusy(button, false);
      }
    }

    function setBusy(button, busy, busyText = '処理中...') {
      if (!button) return;
      if (busy) {
        button.dataset.originalText = button.textContent;
        button.textContent = busyText;
        button.disabled = true;
      } else {
        button.textContent = button.dataset.originalText || button.textContent;
        button.disabled = false;
      }
    }

    function setMessage(id, text, type) {
      const element = document.getElementById(id);
      element.textContent = text;
      element.className = 'message' + (type ? ` ${type}` : '');
    }

    function formatMoney(value) {
      return `¥${Number(value || 0).toLocaleString('ja-JP')}`;
    }

    function createRequestId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return `req-${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    let toastTimer;
    function showToast(text, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.className = 'toast show' + (isError ? ' error' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.className = 'toast', 3300);
    }
  </script>
</body>
